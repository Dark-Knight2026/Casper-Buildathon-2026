#cloud-config

merge_how:
 - name: list
   settings: [append]
 - name: dict
   settings: [no_replace, recurse_list]

users:
  - name: root
    shell: /bin/bash
    sudo: ["ALL=(ALL) NOPASSWD: ALL"]
    lock_passwd: true

  - name: deploy
    shell: /bin/bash
    groups: [docker]
    lock_passwd: true
    ssh_authorized_keys:
      - ${ssh_public_key}

ssh_pwauth: false

chpasswd:
  expire: false

package_update: true
package_upgrade: true

packages:
  - htop
  - apt-transport-https
  - ca-certificates
  - curl
  - software-properties-common
  - gnupg
  - make

write_files:
  - path: /etc/ssh/sshd_config.d/99-no-password.conf
    content: |
      PasswordAuthentication no
      PermitRootLogin no

  - path: /root/service_account.json.b64
    permissions: '0600'
    owner: root:root
    content: |
      ${service_account_creds_b64}

  - path: /root/init.sh
    permissions: '0700'
    owner: root:root
    content: |
      #!/bin/bash
      set -euo pipefail

      # decode service account creds
      base64 -d /root/service_account.json.b64 > /root/service_account.json
      chmod 600 /root/service_account.json

      # ===========================================================================================
      ## Firewall (ufw) install
      apt install -y ufw
      ufw default deny incoming
      ufw default allow outgoing
      ufw allow 22/tcp   # SSH
      ufw allow 80/tcp   # HTTP (certbot + redirect)
      ufw allow 443/tcp  # HTTPS
      ufw --force enable

      # ===========================================================================================
      ## Fail2ban install
      apt install -y fail2ban
      cat > /etc/fail2ban/jail.local <<'JAIL'
      [sshd]
      enabled  = true
      port     = ssh
      filter   = sshd
      logpath  = /var/log/auth.log
      maxretry = 5
      bantime  = 3600
      findtime = 600
      JAIL
      systemctl enable fail2ban
      systemctl restart fail2ban

      # ===========================================================================================
      ## Docker install
      echo "[INFO] Installing Docker..."
      mkdir -p /etc/apt/keyrings
      curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      chmod a+r /etc/apt/keyrings/docker.gpg
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
      apt update
      apt install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
      systemctl enable docker
      mkdir -p /etc/docker
      cat > /etc/docker/daemon.json <<'DAEMON'
      {
        "ipv6": true,
        "fixed-cidr-v6": "fd00:dead:beef::/48"
      }
      DAEMON
      systemctl start docker

      # ===========================================================================================
      ## Docker login
      echo "[INFO] Docker login..."
      cat /root/service_account.json | docker login -u _json_key --password-stdin https://${google_application_region}-docker.pkg.dev
      mkdir -p /home/deploy/.docker
      cp /root/.docker/config.json /home/deploy/.docker/config.json
      chown -R deploy:deploy /home/deploy/.docker
      chmod 600 /home/deploy/.docker/config.json
      shred -u /root/service_account.json.b64 /root/service_account.json

      # ===========================================================================================
      ## Certbot install (Python venv — https://certbot.eff.org/instructions?ws=other&os=pip)
      echo "[INFO] Installing certbot..."
      apt install -y python3 python3-dev python3-venv libaugeas-dev gcc
      python3 -m venv /opt/certbot/
      /opt/certbot/bin/pip install --upgrade pip
      /opt/certbot/bin/pip install certbot certbot-dns-cloudflare
      ln -sf /opt/certbot/bin/certbot /usr/local/bin/certbot

      # Renewal: twice daily with random delay to avoid LE rate-limit spikes
      echo "0 0,12 * * * root /opt/certbot/bin/python -c 'import random; import time; time.sleep(random.random() * 3600)' && certbot renew -q" >> /etc/crontab

      # Monthly certbot upgrade (first day of month at 03:00)
      echo "0 3 1 * * root /opt/certbot/bin/pip install --upgrade certbot certbot-dns-cloudflare -q" >> /etc/crontab

      # nginx reload hook — runs after every successful certbot renewal
      mkdir -p /etc/letsencrypt/renewal-hooks/deploy
      cat > /etc/letsencrypt/renewal-hooks/deploy/reload-nginx.sh <<'HOOK'
      #!/bin/bash
      docker exec leasefi_nginx nginx -s reload
      HOOK
      chmod +x /etc/letsencrypt/renewal-hooks/deploy/reload-nginx.sh

      echo "Instance init completed."


runcmd:
  - mkdir -p /opt/${project_name}/deploy /opt/${project_name}/nginx /opt/${project_name}/logs
  - chown -R deploy:deploy /opt/${project_name}
  - /root/init.sh > /opt/${project_name}/logs/01_deploy-init.log 2>&1
  - systemctl restart ssh
