# Nextest configuration
# https://nexte.st/book/configuration

[profile.default]
# Fail immediately if a test exceeds the timeout
slow-timeout = { period = "30s", terminate-after = 2 }

# Hard timeout per test
test-threads = "num-cpus"

# Show slow tests in the output
status-level = "slow"
final-status-level = "fail"

# Retry infra-flaky tests (testcontainers PortNotExposed) once, with backoff
retries = { backoff = "exponential", count = 2, delay = "1s" }
