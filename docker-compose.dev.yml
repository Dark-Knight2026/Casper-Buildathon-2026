x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: leasefi_nginx
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.50"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${OPT_DIR:-/opt/leasefi}/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${OPT_DIR:-/opt/leasefi}/nginx/https.conf:/etc/nginx/conf.d/https.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - leasefi_net
    logging: *default-logging

  backend:
    image: ${BACK_IMAGE:-${TAG}_back:${VERSION}}
    container_name: leasefi_backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.50"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    env_file:
      - .env
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:?RUN_MIGRATIONS is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:?SUPABASE_JWT_SECRET is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
    depends_on:
      - redis
    networks:
      - leasefi_net
    logging: *default-logging

  indexer:
    image: ${INDEXER_IMAGE:-${TAG}_indexer:${VERSION}}
    container_name: leasefi_indexer
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.50"
    env_file:
      - .env
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      CSPR_CLOUD_API_TOKEN: ${CSPR_CLOUD_API_TOKEN:?CSPR_CLOUD_API_TOKEN is required}
      CSPR_CLOUD_REST_URL: ${CSPR_CLOUD_REST_URL:?CSPR_CLOUD_REST_URL is required}
      CSPR_CLOUD_WSS_URL: ${CSPR_CLOUD_WSS_URL:?CSPR_CLOUD_WSS_URL is required}
      CASPER_NODE_RPC_URL: ${CASPER_NODE_RPC_URL:?CASPER_NODE_RPC_URL is required}
      CONTRACT_USDC: ${CONTRACT_USDC:?CONTRACT_USDC is required}
      CONTRACT_USDT: ${CONTRACT_USDT:?CONTRACT_USDT is required}
      CONTRACT_BIG: ${CONTRACT_BIG:?CONTRACT_BIG is required}
      CONTRACT_TREASURY: ${CONTRACT_TREASURY:?CONTRACT_TREASURY is required}
      CONTRACT_ICO: ${CONTRACT_ICO:?CONTRACT_ICO is required}
      CONTRACT_VESTING: ${CONTRACT_VESTING:?CONTRACT_VESTING is required}
      CONTRACT_STAKING: ${CONTRACT_STAKING:?CONTRACT_STAKING is required}
      START_BLOCK_CONTRACT_USDC: ${START_BLOCK_CONTRACT_USDC:?START_BLOCK_CONTRACT_USDC is required}
      START_BLOCK_CONTRACT_USDT: ${START_BLOCK_CONTRACT_USDT:?START_BLOCK_CONTRACT_USDT is required}
      START_BLOCK_CONTRACT_BIG: ${START_BLOCK_CONTRACT_BIG:?START_BLOCK_CONTRACT_BIG is required}
      START_BLOCK_CONTRACT_TREASURY: ${START_BLOCK_CONTRACT_TREASURY:?START_BLOCK_CONTRACT_TREASURY is required}
      START_BLOCK_CONTRACT_ICO: ${START_BLOCK_CONTRACT_ICO:?START_BLOCK_CONTRACT_ICO is required}
      START_BLOCK_CONTRACT_VESTING: ${START_BLOCK_CONTRACT_VESTING:?START_BLOCK_CONTRACT_VESTING is required}
      START_BLOCK_CONTRACT_STAKING: ${START_BLOCK_CONTRACT_STAKING:?START_BLOCK_CONTRACT_STAKING is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - leasefi_net
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: leasefi_redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"
    # Config file keeps REDIS_PASSWORD out of process args and Docker metadata.
    # redis.conf is generated by redeploy.sh via envsubst from redis.conf.template.
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ${OPT_DIR:-/opt/leasefi}/deploy/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      # Accept PONG (no auth) or NOAUTH (auth required but server is up)
      test: ["CMD-SHELL", "redis-cli ping 2>&1 | grep -E 'PONG|NOAUTH'"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - leasefi_net
    logging: *default-logging

volumes:
  redis_data:

networks:
  leasefi_net:
    driver: bridge
    enable_ipv6: true
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16
        - subnet: fd00:c0ff:ee00::/64
