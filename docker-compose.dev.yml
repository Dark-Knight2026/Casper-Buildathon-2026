version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  nginx:
    image: nginx:alpine
    container_name: leasefi_nginx
    ports:
      - "80:80"
    volumes:
      - ${OPT_DIR}/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - leasefi_net
    logging: *default-logging

  backend:
    image: ${TAG}_back:${VERSION}
    container_name: leasefi_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:?SUPABASE_JWT_SECRET is required}
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    networks:
      - leasefi_net
    logging: *default-logging

  indexer:
    image: ${TAG}_indexer:${VERSION}
    container_name: leasefi_indexer
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    networks:
      - leasefi_net
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: leasefi_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - leasefi_net
    logging: *default-logging

volumes:
  redis_data:

networks:
  leasefi_net:
    driver: bridge
    enable_ipv6: true
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16
        - subnet: fd00:dead:beef:1::/64
