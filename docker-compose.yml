services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: leasefi_backend
    container_name: leasefi_api
    ports:
      - "8080:8080"
    env_file:
      - .env
    
    environment:
      - DATABASE_URL=postgres://postgres:postgres@host.docker.internal:54322/postgres
      - REDIS_URL=redis://redis:6379
      
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - leasefi_net

  redis:
    image: redis:7-alpine
    container_name: leasefi_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - leasefi_net

volumes:
  redis_data:

networks:
  leasefi_net: